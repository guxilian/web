<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>国内多人聊天室</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{background:#f2f5f9;padding:20px}
    .chat{max-width:700px;margin:0 auto;background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 0 10px rgba(0,0,0,0.1)}
    .top{background:#007bff;color:white;padding:16px;text-align:center;font-size:18px}
    .msgs{height:500px;padding:20px;overflow-y:auto;background:#fafbfc}
    .msg{margin-bottom:10px;max-width:75%;padding:10px 14px;border-radius:12px}
    .me{background:#007bff;color:white;margin-left:auto}
    .other{background:#e9e9eb;color:#333;margin-right:auto}
    .input-box{display:flex;padding:15px;border-top:1px solid #eee}
    #name{width:100px;padding:12px;border:1px solid #ddd;border-radius:24px;margin-right:8px;outline:none}
    #text{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:24px;outline:none}
    button{padding:12px 20px;background:#007bff;color:white;border:none;border-radius:24px;margin-left:8px;cursor:pointer}
  </style>
</head>
<body>
<div class="chat">
  <div class="top">🌍 国内多人公共聊天室（所有人可见）</div>
  <div class="msgs" id="msgs"></div>
  <div class="input-box">
    <input type="text" id="name" placeholder="昵称" value="用户">
    <input type="text" id="text" placeholder="输入消息...">
    <button onclick="send()">发送</button>
  </div>
</div>

<script src="https://cdn.goeasy.io/goeasy-2.6.0.min.js"></script>
<script>
  console.log("开始初始化 GoEasy...");
  const goEasy = GoEasy.getInstance({
    host: 'hangzhou.goeasy.io',
    appkey: 'BC-eb5fdf3b144f4d1ba06a850372ae40db',
  });

  goEasy.connect({
    onSuccess: () => {
      console.log("✅ GoEasy 连接成功！");
      // 连接成功后再订阅
      goEasy.subscribe({
        channel: 'public_chat',
        onMessage: (msg) => {
          console.log("📩 收到消息：", msg.content);
          addMsg(msg.content, false);
        },
        onSuccess: () => console.log("✅ 订阅 public_chat 成功"),
        onFailed: (err) => console.error("❌ 订阅失败：", err)
      });
    },
    onFailed: (err) => console.error("❌ GoEasy 连接失败：", err)
  });

  const msgs = document.getElementById('msgs');
  const nameInput = document.getElementById('name');
  const textInput = document.getElementById('text');

  function addMsg(text, isMe) {
    const div = document.createElement('div');
    div.className = 'msg ' + (isMe ? 'me' : 'other');
    div.innerText = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function send() {
    const name = nameInput.value || '匿名';
    const text = textInput.value.trim();
    if (!text) return;
    const content = `${name}：${text}`;
    console.log("📤 发送消息：", content);
    
    goEasy.publish({
      channel: 'public_chat',
      message: content,
      onSuccess: () => console.log("✅ 消息发送成功"),
      onFailed: (err) => console.error("❌ 消息发送失败：", err)
    });
    
    addMsg(content, true);
    textInput.value = '';
  }

  textInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') send();
  });
</script>
</body>
</html>
