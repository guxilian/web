<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>多人在线聊天室</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f2f5f9;padding:20px}
        .chat{max-width:700px;margin:0 auto;background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 0 10px rgba(0,0,0,0.1)}
        .top{background:#007bff;color:white;padding:16px;text-align:center;font-size:18px}
        .msgs{height:500px;padding:20px;overflow-y:auto;background:#fafbfc}
        .msg{margin-bottom:10px;max-width:75%;padding:10px 14px;border-radius:12px}
        .me{background:#007bff;color:white;margin-left:auto}
        .other{background:#e9e9eb;color:#333;margin-right:auto}
        .input-box{display:flex;padding:15px;border-top:1px solid #eee}
        #name{width:100px;padding:12px;border:1px solid #ddd;border-radius:24px;margin-right:8px;outline:none}
        #text{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:24px;outline:none}
        button{padding:12px 20px;background:#007bff;color:white;border:none;border-radius:24px;margin-left:8px;cursor:pointer}
    </style>
</head>
<body>
<div class="chat">
    <div class="top">🌍 公共多人聊天室（所有人可见）</div>
    <div class="msgs" id="msgs"></div>
    <div class="input-box">
        <input type="text" id="name" placeholder="昵称" value="用户">
        <input type="text" id="text" placeholder="输入消息...">
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    // 换用支持广播的公共 WebSocket 服务
    const ws = new WebSocket('wss://socketsbay.com/wss/v2/1/demo/');
    const msgs = document.getElementById('msgs');
    const nameInput = document.getElementById('name');
    const textInput = document.getElementById('text');
    const sendBtn = document.getElementById('sendBtn');

    // 连接成功
    ws.onopen = function() {
        addMsg("系统：连接成功，开始和大家聊天吧！", false);
    };

    // 收到广播消息（所有人都能看到）
    ws.onmessage = function(event) {
        // 过滤掉系统服务器标识消息
        if (!event.data.startsWith("Request served by")) {
            addMsg(event.data, false);
        }
    };

    // 连接断开
    ws.onclose = function() {
        addMsg("系统：连接已断开，请刷新页面重连", false);
    };

    // 添加消息到界面
    function addMsg(text, isMe) {
        const div = document.createElement('div');
        div.className = 'msg ' + (isMe ? 'me' : 'other');
        div.innerText = text;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    // 发送消息（会被广播给所有在线用户）
    function send() {
        const name = nameInput.value || '匿名';
        const text = textInput.value.trim();
        if (!text || ws.readyState !== WebSocket.OPEN) return;
        const content = `${name}：${text}`;
        ws.send(content);
        addMsg(content, true);
        textInput.value = '';
    }

    // 绑定按钮和回车事件
    sendBtn.addEventListener('click', send);
    textInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') send();
    });
</script>
</body>
</html>
