<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扣子智能体对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        #coze-widget {
            max-width: 800px;
            height: 800px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="coze-widget"></div>

    <!-- 扣子官方 Web SDK -->
    <script src="https://assets.coze.cn/sdk/coze-web-sdk.js"></script>
    <script>
        CozeSDK.init({
            container: "#coze-widget",
            botId: "7600986535647412266",
            spaceId: "7600320606860574729",
            theme: "light"
        });
    </script>
</body>
</html>
