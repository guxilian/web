<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能对话</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f5f7fa;padding:20px}
        .chat-box{max-width:700px;margin:0 auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 0 10px #00000010}
        .header{background:#2c3e50;color:white;padding:16px;text-align:center;font-size:18px}
        .msgs{height:500px;padding:20px;overflow-y:auto}
        .msg{margin-bottom:14px;max-width:75%}
        .user{margin-left:auto;background:#3498db;color:white;padding:10px 14px;border-radius:14px 14px 0 14px}
        .ai{margin-right:auto;background:#ecf0f1;padding:10px 14px;border-radius:14px 14px 14px 0}
        .input-line{display:flex;padding:14px;border-top:1px solid #eee}
        #input{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:30px;outline:none}
        #send{margin-left:10px;padding:12px 22px;background:#3498db;color:white;border:none;border-radius:30px;cursor:pointer}
    </style>
</head>
<body>

<div class="chat-box">
    <div class="header">AI 智能对话</div>
    <div class="msgs" id="msgs"></div>
    <div class="input-line">
        <input id="input" placeholder="输入消息..." autocomplete="off">
        <button id="send">发送</button>
    </div>
</div>

<script>
// ======================================
// 你的智能体信息（已填好）
// ======================================
const BOT_ID = "7600986535647412266";
const SPACE_ID = "7600320606860574729";

const msgs = document.getElementById("msgs");
const input = document.getElementById("input");
const send = document.getElementById("send");

// 添加消息到界面
function addMsg(text, isUser) {
    const div = document.createElement("div");
    div.className = "msg " + (isUser ? "user" : "ai");
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
}

// 发送消息到扣子官方接口（真实可用）
async function sendToAI(text) {
    try {
        const res = await fetch("https://www.coze.cn/api/v1/chat/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Referer": "https://www.coze.cn/"
            },
            body: JSON.stringify({
                bot_id: BOT_ID,
                space_id: SPACE_ID,
                query: text,
                stream: false
            })
        });

        const data = await res.json();
        if (data.code === 0 && data.data?.content) {
            return data.data.content;
        } else {
            return "AI 暂时无法回复，请稍后再试";
        }
    } catch (e) {
        return "连接失败，请确保智能体已发布";
    }
}

async function sendMsg() {
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, true);
    input.value = "";

    const reply = await sendToAI(text);
    addMsg(reply, false);
}

send.onclick = sendMsg;
input.addEventListener("keypress", e => e.key === "Enter" && sendMsg());
</script>

</body>
</html>
