<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能对话</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f5f7fa;padding:20px}
        .chat{max-width:700px;margin:0 auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 0 10px #00000010}
        .title{background:#2c3e50;color:white;padding:16px;text-align:center;font-size:18px}
        .msgs{height:500px;padding:20px;overflow-y:auto}
        .msg{margin-bottom:14px;max-width:75%}
        .user{margin-left:auto;background:#3498db;color:white;padding:10px 14px;border-radius:14px 14px 0 14px}
        .ai{margin-right:auto;background:#ecf0f1;padding:10px 14px;border-radius:14px 14px 14px 0}
        .inputbar{display:flex;padding:14px;border-top:1px solid #eee}
        #input{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:30px;outline:none}
        #send{margin-left:10px;padding:12px 22px;background:#3498db;color:white;border:none;border-radius:30px}
    </style>
</head>
<body>

<div class="chat">
    <div class="title">扣子智能体 AI 对话</div>
    <div class="msgs" id="msgs"></div>
    <div class="inputbar">
        <input id="input" placeholder="输入消息..." autocomplete="off">
        <button id="send">发送</button>
    </div>
</div>

<script src="https://assets.coze.cn/boot.js"></script>
<div id="coze-chat"></div>
<script>
CozeChat.init({
    botId: "7600986535647412266",
    spaceId: "7600320606860574729"
});
</script>

</body>
</html>
