<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>多人在线聊天室（纯前端版）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f2f5f9;padding:20px}
        .chat{max-width:700px;margin:0 auto;background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 0 10px rgba(0,0,0,0.1)}
        .top{background:#007bff;color:white;padding:16px;text-align:center;font-size:18px}
        .msgs{height:500px;padding:20px;overflow-y:auto;background:#fafbfc}
        .msg{margin-bottom:10px;max-width:75%;padding:10px 14px;border-radius:12px}
        .me{background:#007bff;color:white;margin-left:auto}
        .other{background:#e9e9eb;color:#333;margin-right:auto}
        .input-box{display:flex;padding:15px;border-top:1px solid #eee}
        #name{width:100px;padding:12px;border:1px solid #ddd;border-radius:24px;margin-right:8px;outline:none}
        #text{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:24px;outline:none}
        button{padding:12px 20px;background:#007bff;color:white;border:none;border-radius:24px;margin-left:8px;cursor:pointer}
    </style>
</head>
<body>
<div class="chat">
    <div class="top">🌍 公共多人聊天室（跨标签页可见）</div>
    <div class="msgs" id="msgs"></div>
    <div class="input-box">
        <input type="text" id="name" placeholder="昵称" value="用户">
        <input type="text" id="text" placeholder="输入消息...">
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    const msgs = document.getElementById('msgs');
    const nameInput = document.getElementById('name');
    const textInput = document.getElementById('text');
    const sendBtn = document.getElementById('sendBtn');
    const STORAGE_KEY = 'chat_messages';

    // 初始化：从 localStorage 加载历史消息
    function loadMessages() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const messages = JSON.parse(saved);
            messages.forEach(msg => addMsg(msg.content, msg.isMe));
        }
    }

    // 添加消息到界面
    function addMsg(text, isMe) {
        const div = document.createElement('div');
        div.className = 'msg ' + (isMe ? 'me' : 'other');
        div.innerText = text;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    // 保存消息到 localStorage
    function saveMessage(content, isMe) {
        const saved = localStorage.getItem(STORAGE_KEY);
        const messages = saved ? JSON.parse(saved) : [];
        messages.push({ content, isMe });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    // 发送消息（会触发其他标签页的 storage 事件）
    function send() {
        const name = nameInput.value || '匿名';
        const text = textInput.value.trim();
        if (!text) return;
        const content = `${name}：${text}`;
        addMsg(content, true);
        saveMessage(content, true);
        textInput.value = '';
    }

    // 监听其他标签页的消息（核心：跨页面通信）
    window.addEventListener('storage', (e) => {
        if (e.key === STORAGE_KEY) {
            // 清空当前消息，重新加载所有消息
            msgs.innerHTML = '';
            loadMessages();
        }
    });

    // 绑定事件
    sendBtn.addEventListener('click', send);
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') send();
    });

    // 页面加载时初始化
    loadMessages();
    addMsg("系统：已进入聊天室，打开多个标签页即可多人聊天", false);
</script>
</body>
</html>
